<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>冯泽英 · 42岁生日快乐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at center, #f9e9e0 0%, #f5ddd0 40%, #eed9ce 100%);
      font-family: "Noto Serif SC", "华文楷体", "KaiTi", "STKaiti", "PingFang SC", "Microsoft YaHei", serif;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      animation: bodyBreath 6s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    @keyframes bodyBreath {
      0%, 100% { background: radial-gradient(circle at center, #f9e9e0 0%, #f5ddd0 40%, #eed9ce 100%); }
      50% { background: radial-gradient(circle at center, #fdf3ed 0%, #f7e2d6 40%, #f0ddd1 100%); }
    }

    /* 横屏主容器 */
    .landscape {
      width: 100vw;
      max-width: 900px;
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      padding: 14px 10px 20px;
      gap: 12px;
      z-index: 10;
      position: relative;
    }

    /* 左侧信息区 */
    .left-panel {
      flex: 1 1 38%;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* 右侧照片区 */
    .right-panel {
      flex: 1 1 58%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 开屏——横屏展开幕布 */
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0;
      width: 50vw;
      height: 100%;
      background: #fce9e2;
      z-index: 999;
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .curtain-left { left: 0; background: linear-gradient(to right, #f8d5c4, #fbe8df); }
    .curtain-right { right: 0; background: linear-gradient(to left, #f8d5c4, #fbe8df); }
    .curtain-left.open { transform: translateX(-100%); }
    .curtain-right.open { transform: translateX(100%); }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fdf5e6;
      background-image: radial-gradient(circle at 20% 30%, #f9e6c9 1px, transparent 1px);
      background-size: 30px 30px;
      border: 3px solid #c9a87c;
      border-radius: 22px;
      padding: 18px 16px;
      box-shadow: 0 20px 40px rgba(120, 60, 30, 0.3);
      z-index: 1000;
      text-align: center;
      font-size: 1.1rem;
      color: #5d3a2c;
      font-weight: bold;
      letter-spacing: 3px;
      opacity: 0;
      transition: opacity 0.6s, transform 0.8s;
      pointer-events: none;
    }
    .popup.show { opacity: 1; }
    .popup.hide { opacity: 0; transform: translate(-50%, -150%); }

    .title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(180deg, #d4a56a 0%, #b8863a 40%, #8b6914 70%, #c9a053 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px rgba(180,120,40,0.4));
      letter-spacing: 4px;
      animation: titleGlow 2.5s ease-in-out infinite;
      text-align: center;
      word-break: keep-all;
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 2px 6px rgba(200,140,50,0.5)); }
      50% { filter: drop-shadow(0 2px 16px rgba(220,160,60,0.9)); }
    }

    .card {
      width: 100%;
      background: rgba(255, 245, 235, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 26px;
      padding: 16px 14px;
      position: relative;
      box-shadow: 0 12px 24px rgba(160, 100, 60, 0.15);
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(45deg, #dbb45c, #f3d59c, #c9a24c, #e8c878, #b58b3c);
      background-size: 400% 400%;
      border-radius: 28px;
      z-index: -1;
      animation: borderGlow 4s linear infinite;
    }
    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card-text {
      font-size: 0.9rem;
      line-height: 1.8;
      color: #4d3022;
      text-align: left;
      min-height: 200px;
      font-weight: 500;
    }
    .flower-btn {
      background: #f3d9c6;
      border: none;
      border-radius: 26px;
      padding: 8px 18px;
      margin-top: 10px;
      font-size: 1rem;
      cursor: pointer;
      color: #7b4a2c;
      box-shadow: 0 4px 10px rgba(150,80,20,0.2);
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
    }

    /* 中间大图 photo17 */
    .hero-photo {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }
    .hero-photo .photo-item {
      width: 65%;
      aspect-ratio: 3/4;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(100, 50, 30, 0.3);
      background: #f0d9cc;
    }
    .hero-photo .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: sepia(0.1) brightness(1.05);
      border-radius: 24px;
      display: block;
    }

    /* 照片网格 */
    .photo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .photo-item {
      width: 30%;
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(100, 50, 30, 0.15);
      background: #f0d9cc;
      transition: transform 0.3s;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: sepia(0.1) brightness(1.05);
      border-radius: 16px;
      display: block;
    }
    .photo-item:nth-child(odd) { animation: floatUp 3.5s ease-in-out infinite; }
    .photo-item:nth-child(even) { animation: floatDown 3.8s ease-in-out infinite; }
    @keyframes floatUp {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes floatDown {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    .timer-ring {
      width: 110px;
      height: 110px;
      border: 3px solid #dbb45c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px auto;
      animation: spinRing 20s linear infinite;
      box-shadow: 0 0 18px rgba(200,140,60,0.2);
    }
    .timer-inner {
      text-align: center;
      font-size: 0.8rem;
      color: #6b4226;
      animation: spinInner 20s linear infinite reverse;
    }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }
    @keyframes spinInner { 100% { transform: rotate(-360deg); } }

    .ribbon-bottom {
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #bb7a5a;
      animation: sway 4s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: translateX(0); }
      50% { transform: translateX(6px); }
    }

    .falling {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      animation: fallDown linear infinite;
    }
    @keyframes fallDown {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .butterfly {
      position: fixed;
      font-size: 1.6rem;
      z-index: 200;
    }
  </style>
</head>
<body>

  <div class="curtain-left" id="curtainL"></div>
  <div class="curtain-right" id="curtainR"></div>
  <div class="popup" id="popup">✍️ 给最爱的妈妈</div>

  <div class="landscape" id="mainContent">

    <!-- 左侧面板 -->
    <div class="left-panel">
      <h1 class="title" id="titleText">妈妈生日快乐</h1>

      <div class="card">
        <div class="card-text" id="typewriter"></div>
        <button class="flower-btn" id="flowerBtn">🌸 绽放礼花</button>
      </div>

      <div class="timer-ring">
        <div class="timer-inner" id="countdown">加载中...</div>
      </div>

      <div class="ribbon-bottom">🎀 幼时您护我长大<br>余生伴您岁岁安康 🎀</div>
    </div>

    <!-- 右侧面板 -->
    <div class="right-panel">
      <!-- photo17 中间大图 -->
      <div class="hero-photo" id="heroPhoto"></div>
      <!-- 其余16张网格 -->
      <div class="photo-grid" id="photoGrid"></div>
    </div>

  </div>

  <audio id="birthdayAudio" loop preload="auto">
    <source src="https://www.soundjay.com/human/sounds/happy-birthday-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      // 开屏
      setTimeout(() => {
        document.getElementById('curtainL').classList.add('open');
        document.getElementById('curtainR').classList.add('open');
        const popup = document.getElementById('popup');
        popup.classList.add('show');
        setTimeout(() => popup.classList.add('hide'), 1500);
      }, 300);

      // 标题逐字
      const titleEl = document.getElementById('titleText');
      const titleText = '妈妈生日快乐';
      titleEl.innerHTML = '';
      [...titleText].forEach((char, i) => {
        const span = document.createElement('span');
        span.textContent = char;
        span.style.opacity = '0';
        span.style.transition = 'opacity 0.4s';
        span.style.display = 'inline-block';
        titleEl.appendChild(span);
        setTimeout(() => { span.style.opacity = '1'; }, 1400 + i * 160);
      });

      // 三连击
      let clickCount = 0;
      titleEl.addEventListener('click', () => {
        clickCount++;
        if (clickCount >= 3) {
          launchFireworks();
          document.getElementById('birthdayAudio').play().catch(()=>{});
          clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 1500);
      });

      // 打字机
      const fullText = `时光的丝线轻绕指尖，织成第四十二圈温柔的年轮。\n你眉间藏着春风的絮语，眼底流转着岁月的星子，那些被柴米油盐浸润的日子，在你掌心开出了细碎的花。\n愿晨露为你斟一杯清欢，晚风替你拂去倦意，未来的路途有月光铺就台阶，每一步都踏着芬芳与明亮。\n妈妈，生日快乐——你不是被光阴追着走的人，而是光阴里永远鲜活的诗。`;
      const typewriterEl = document.getElementById('typewriter');
      let charIndex = 0;
      function typeWriter() {
        if (charIndex < fullText.length) {
          typewriterEl.textContent += fullText.charAt(charIndex);
          charIndex++;
          setTimeout(typeWriter, 50);
        }
      }
      setTimeout(typeWriter, 2200);

      document.getElementById('flowerBtn').addEventListener('click', launchFireworks);

      function launchFireworks() {
        for (let i=0; i<25; i++) {
          const el = document.createElement('div');
          el.className = 'falling';
          el.style.left = Math.random()*100+'%';
          el.style.top = Math.random()*40+'%';
          el.style.animationDuration = (Math.random()*2+1.3)+'s';
          el.innerHTML = ['🌸','✨','🎂','💐','🌟'][Math.floor(Math.random()*5)];
          el.style.fontSize = (Math.random()*1.8+1)+'rem';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2000);
        }
      }

      // photo17 大图
      const heroDiv = document.getElementById('heroPhoto');
      const heroItem = document.createElement('div');
      heroItem.className = 'photo-item';
      const heroImg = document.createElement('img');
      heroImg.src = 'images/photo17.jpg';
      heroImg.alt = '照片17';
      heroImg.loading = 'eager';
      heroItem.appendChild(heroImg);
      heroItem.addEventListener('click', () => {
        heroItem.style.transform = 'scale(1.5)';
        heroItem.style.zIndex = '50';
        setTimeout(() => { heroItem.style.transform = ''; heroItem.style.zIndex = ''; }, 500);
      });
      heroDiv.appendChild(heroItem);

      // 其余16张
      const grid = document.getElementById('photoGrid');
      for (let i=0; i<16; i++) {
        const div = document.createElement('div');
        div.className = 'photo-item';
        const img = document.createElement('img');
        img.src = `images/photo${i+1}.jpg`;
        img.alt = `照片${i+1}`;
        img.loading = 'lazy';
        img.decoding = 'async';
        div.appendChild(img);
        div.addEventListener('click', () => {
          div.style.transform = 'scale(1.5)';
          div.style.zIndex = '50';
          setTimeout(() => { div.style.transform = ''; div.style.zIndex = ''; }, 500);
        });
        grid.appendChild(div);
      }

      // 倒计时
      function updateCountdown() {
        const now = new Date();
        const next = new Date(now.getFullYear(), 5, 5);
        if (now > next) next.setFullYear(next.getFullYear()+1);
        const diff = next - now;
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById('countdown').innerHTML = `${days}天<br>${hours}:${minutes}:${seconds}`;
      }
      setInterval(updateCountdown, 1000);
      updateCountdown();

      // 飘落
      const items = ['✨','🌸','💮','🏵️','🌟','安康','喜乐'];
      setInterval(() => {
        const el = document.createElement('div');
        el.className = 'falling';
        el.textContent = items[Math.floor(Math.random()*items.length)];
        el.style.left = Math.random()*95+'%';
        el.style.animationDuration = (Math.random()*8+6)+'s';
        el.style.fontSize = (Math.random()*1.5+0.7)+'rem';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 10000);
      }, 700);

      // 蝴蝶
      setTimeout(() => {
        const butterfly = document.createElement('div');
        butterfly.className = 'butterfly';
        butterfly.textContent = '🦋';
        butterfly.style.right = '6px';
        butterfly.style.bottom = '14px';
        document.body.appendChild(butterfly);
        let pos = 0;
        const fly = setInterval(() => {
          pos += 2;
          butterfly.style.right = (6 + Math.sin(pos*0.1)*20) + 'px';
          butterfly.style.bottom = (14 + Math.cos(pos*0.08)*18) + 'px';
          if (pos > 60) { butterfly.remove(); clearInterval(fly); }
        }, 120);
      }, 30000);
    })();
  </script>
</body>
</html>
